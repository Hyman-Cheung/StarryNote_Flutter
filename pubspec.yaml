name: notes_taking_app
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.1+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  graphview: ^1.2.0

  english_words: ^4.0.0
  provider: ^6.1.2
  sqflite: ^2.4.1
  path: ^1.9.0
  color: ^3.0.0
  path_provider: ^2.1.5
  vector_math: ^2.1.4
  fluttertoast: ^8.1.1
  defer_pointer: ^0.0.2
  uuid: ^4.5.1
  flutter_colorpicker: ^1.1.0
  shared_preferences: ^2.5.3
  cupertino_icons: ^1.0.8
  file_picker: ^10.0.0
  pdf: ^3.11.3
  flutter_pdfview: ^1.0.0
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  permission_handler: ^12.0.0+1
  table_calendar: ^3.2.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi:
  sqflite_common_ffi_web:
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets: 
    - assets/ImgButton/lassoTool.png
    - assets/ImgButton/eraser.png
    - assets/privacy_policy.txt
    - assets/terms_of_service.txt
    - assets/contact.txt
    - assets/aboutourapp.txt
    - assets/acknowledgement.txt
    - assets/appearance.txt
    - assets/logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png" 
  adaptive_icon_background: "#FFFFFF" 
  adaptive_icon_foreground: "assets/logo.png" 